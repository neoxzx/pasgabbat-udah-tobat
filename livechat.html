<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT v43 // MOBILE OPTIMIZED</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #000; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            padding-top: 85px; 
        }

        /* --- NAVBAR FLOATING (RESPONSIF MOBILE) --- */
        nav { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            padding: 10px 15px; border-radius: 50px; border: 1px solid var(--gold); 
            display: flex; gap: 12px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            width: 90%; max-width: 400px; justify-content: center;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.6rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        nav a:hover { color: var(--gold); }

        /* --- MESSAGES AREA --- */
        #messages { flex: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; clear: both; cursor: pointer; position: relative; font-size: 14px; line-height: 1.4; transition: transform 0.1s; }
        .msg-in { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.15); align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid var(--gold); }
        .sender { color: var(--gold); font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; }

        .replied-box { background: rgba(255,255,255,0.08); border-left: 2px solid var(--gold); padding: 4px 8px; font-size: 11px; margin-bottom: 6px; border-radius: 4px; color: #999; }

        /* SNAP STYLE MOBILE */
        .snap-btn-msg { background: #222; padding: 15px; border-radius: 12px; text-align: center; border: 1px dashed var(--gold); margin: 5px 0; }
        .snap-img { width: 100%; max-width: 300px; border-radius: 10px; display: none; margin-top: 5px; }

        /* --- INPUT AREA MOBILE --- */
        #reply-bar { background: #111; padding: 8px 15px; display: none; justify-content: space-between; border-top: 1px solid var(--gold); align-items: center; font-size: 12px; }
        
        .input-bar { padding: 12px; background: #000; display: flex; gap: 8px; border-top: 1px solid #222; align-items: center; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        input[type="text"] { flex: 1; padding: 12px 16px; border-radius: 25px; border: 1px solid #333; background: #111; color: #fff; outline: none; font-size: 16px; } /* font 16px mencegah auto-zoom di iPhone */
        
        .btn-action { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #000; flex-shrink: 0; }
        .btn-send { width: auto; padding: 0 20px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="livechat.html" style="color: var(--gold);">Live Chat</a>
    <a href="anggota.html">Anggota</a>
</nav>

<div id="messages"></div>

<div id="reply-bar">
    <span id="reply-label" style="color:#d4af37">Membalas...</span>
    <button onclick="cancelReply()" style="background:none; border:none; color:var(--red); font-size: 1.5em; padding: 0 5px;">✕</button>
</div>

<div class="input-bar">
    <input type="file" id="f-in" style="display:none" accept="image/*">
    <button class="btn-action" onclick="document.getElementById('f-in').click()" id="cam-btn">📷</button>
    <input type="text" id="t-in" placeholder="Ketik pesan..." autocomplete="off">
    <button class="btn-action btn-send" onclick="sendText()">KIRIM</button>
</div>

<script>
    window.onload = function() {
        const URL = 'https://ebhucnypxltzxwzillmp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaHVjbnlweGx0enh3emlsbG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzIzNjIsImV4cCI6MjA5MDEwODM2Mn0.UHwMf9Ac-8KJgsvUQ1NH6yvuNaimpK994FPTBoIiimE';
        const _supa = supabase.createClient(URL, KEY);

        let user = prompt("Identitas Kamu:") || "User";
        let rId = null;
        let cache = [];

        async function loadData() {
            const { data } = await _supa.from('message').select('*').order('created_at', { ascending: true });
            if (data) { cache = data; document.getElementById('messages').innerHTML = ""; data.forEach(m => render(m)); }
        }

        async function deleteMsg(id) {
            if (confirm("Hapus pesan ini?")) {
                await _supa.from('message').delete().eq('id', id);
            }
        }

        function render(m) {
            if(!m || !m.sender || !m.content || m.sender === "undefined") return;
            const box = document.getElementById('messages');
            if(document.getElementById(`msg-${m.id}`)) return;

            const div = document.createElement('div');
            div.className = `msg ${m.sender === user ? 'msg-out' : 'msg-in'}`;
            div.id = `msg-${m.id}`;
            
            // Mobile: Tahan 1 detik untuk hapus
            let timer;
            const startPress = () => { timer = setTimeout(() => { deleteMsg(m.id); }, 1000); };
            const endPress = () => { clearTimeout(timer); };
            div.addEventListener('touchstart', startPress);
            div.addEventListener('touchend', endPress);
            div.onmousedown = startPress; div.onmouseup = endPress;

            // Klik sekali untuk reply
            div.onclick = (e) => { 
                rId = m.id; 
                document.getElementById('reply-bar').style.display='flex'; 
                document.getElementById('reply-label').innerText = `Balas ${m.sender}`; 
                document.getElementById('t-in').focus();
            };

            let html = `<span class="sender">${m.sender.toUpperCase()}</span>`;
            if (m.reply_to) {
                const orig = cache.find(x => x.id === m.reply_to);
                if(orig) html += `<div class="replied-box"><b>${orig.sender}</b>: ${orig.is_snap ? '📷 Foto' : orig.content.substring(0,20)}</div>`;
            }

            if (m.is_snap) {
                html += `<div class="snap-wrap">
                            <div class="snap-btn-msg">📸 SNAP TERKUNCI<br><small style="font-size:9px;opacity:0.5">Tahan untuk melihat</small></div>
                            <img src="${m.content}" class="snap-img">
                         </div>`;
            } else {
                const s = document.createElement('span'); s.textContent = m.content; html += s.outerHTML;
            }
            
            div.innerHTML = html;
            box.appendChild(div);

            const snapWrap = div.querySelector('.snap-wrap');
            if(snapWrap) {
                const btn = snapWrap.querySelector('.snap-btn-msg'), img = snapWrap.querySelector('.snap-img');
                const showSnap = (e) => { e.stopPropagation(); clearTimeout(timer); img.style.display = 'block'; btn.style.display = 'none'; };
                const hideSnap = () => { div.remove(); };
                snapWrap.addEventListener('touchstart', showSnap);
                snapWrap.addEventListener('touchend', hideSnap);
            }
            box.scrollTop = box.scrollHeight;
        }

        window.cancelReply = () => { rId = null; document.getElementById('reply-bar').style.display='none'; };

        window.sendText = async () => {
            const inp = document.getElementById('t-in');
            if(!inp.value.trim()) return;
            const v = inp.value; inp.value = ""; 
            const curRid = rId; cancelReply();
            await _supa.from('message').insert([{ sender: user, content: v, is_snap: false, reply_to: curRid }]);
        }

        document.getElementById('f-in').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const camBtn = document.getElementById('cam-btn');
            camBtn.innerText = "⏳";
            const name = `${Date.now()}_${file.name.replace(/\s/g,'_')}`;
            await _supa.storage.from('photos').upload(name, file);
            const url = `${URL}/storage/v1/object/public/photos/${name}`;
            await _supa.from('message').insert([{ sender: user, content: url, is_snap: true, reply_to: rId }]);
            camBtn.innerText = "📷"; cancelReply();
        };

        _supa.channel('room_mobile').on('postgres_changes', { event: '*', schema: 'public', table: 'message' }, p => { 
            if(p.eventType === 'INSERT') { cache.push(p.new); render(p.new); }
            else if(p.eventType === 'DELETE') { document.getElementById(`msg-${p.old.id}`)?.remove(); }
        }).subscribe();
        
        loadData();
    };
</script>
</body>
</html>
