<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT // Chat Fix Scroll</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --dark: #000; }
        * { box-sizing: border-box; }
        
        body, html { 
            background: #000; color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
        }

        /* Navigasi */
        nav { 
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--gold);
            display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 1000;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }

        /* AREA PESAN - PERBAIKAN SCROLL */
        #messages { 
            position: absolute;
            top: 60px; /* Di bawah nav */
            bottom: 80px; /* Di atas input */
            left: 0; right: 0;
            overflow-y: auto; 
            padding: 20px 15px;
            display: block; /* Mengganti flex agar scroll alami */
            -webkit-overflow-scrolling: touch;
        }

        /* Bubble Chat */
        .msg { 
            padding: 12px; border-radius: 15px; max-width: 85%; 
            margin-bottom: 15px; clear: both; /* Agar tidak tumpang tindih */
            position: relative; font-size: 0.95rem; line-height: 1.4;
            word-wrap: break-word;
        }
        .msg-in { background: #1a1a1a; float: left; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.15); float: right; border: 1px solid var(--gold); }
        
        .sender { font-size: 0.65rem; color: var(--gold); font-weight: bold; margin-bottom: 4px; display: block; }
        .reply-box { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; border-left: 3px solid var(--gold); font-size: 0.75rem; margin-bottom: 8px; color: #ccc; }

        /* Input Area (Bottom Fixed) */
        .bottom-area {
            position: fixed; bottom: 0; width: 100%; background: #000; z-index: 999;
        }
        #reply-bar { 
            background: #111; padding: 10px 20px; display: none; 
            border-top: 2px solid var(--gold); justify-content: space-between; align-items: center;
        }
        .input-area { 
            padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222;
        }
        input { 
            flex: 1; background: #111; border: 1px solid #333; color: #fff; 
            padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px;
        }
        .send-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Spacer agar pesan paling bawah tidak tertutup */
        .spacer { height: 20px; clear: both; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="livechat.html">Live Chat</a>
    </nav>

    <div id="messages">
        </div>

    <div class="bottom-area">
        <div id="reply-bar">
            <span id="reply-text" style="font-size: 0.75rem; color: var(--gold);">Membalas...</span>
            <button onclick="cancelReply()" style="background:none; border:none; color:red; font-weight:bold;">BATAL</button>
        </div>
        <div class="input-area">
            <input type="text" id="chat-in" placeholder="Klik pesan untuk balas..." autocomplete="off">
            <button class="send-btn" onclick="send()">KIRIM</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA-_24DwSrWq6f9HWqO7Xs52TCvqq6p_c4",
            authDomain: "pasgabat-chat.firebaseapp.com",
            databaseURL: "https://pasgabat-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pasgabat-chat",
            storageBucket: "pasgabat-chat.firebasestorage.app",
            messagingSenderId: "1027509963546",
            appId: "1:1027509963546:web:d9e9e51275352a595dbaa3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("global_chat_v14");
        
        let user = prompt("Masukkan Nama:") || "Anonim";
        let replyTarget = null;

        function setReply(sender, text) {
            replyTarget = { sender, text };
            document.getElementById('reply-bar').style.display = 'flex';
            document.getElementById('reply-text').textContent = `Membalas ${sender}`;
            document.getElementById('chat-in').focus();
        }

        function cancelReply() {
            replyTarget = null;
            document.getElementById('reply-bar').style.display = 'none';
        }

        function send() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim()) return;
            const data = { sender: user, text: input.value, timestamp: Date.now() };
            if(replyTarget) { data.replyTo = replyTarget; }
            db.push().set(data);
            input.value = "";
            cancelReply();
        }

        db.limitToLast(50).on("child_added", (snap) => {
            const d = snap.val();
            const msgBox = document.getElementById('messages');
            const div = document.createElement('div');
            const isMe = d.sender === user;
            
            div.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
            div.onclick = () => setReply(d.sender, d.text);

            let replyHTML = d.replyTo ? `<div class="reply-box"><b>${d.replyTo.sender}</b><br>${d.replyTo.text}</div>` : "";
            div.innerHTML = `<span class="sender">${isMe ? 'SAYA' : d.sender.toUpperCase()}</span>${replyHTML}<span class="txt"></span>`;
            div.querySelector('.txt').textContent = d.text;
            
            msgBox.appendChild(div);
            
            // Tambahkan spacer agar float tidak berantakan
            const clearDiv = document.createElement('div');
            clearDiv.style.clear = "both";
            msgBox.appendChild(clearDiv);

            // Scroll otomatis ke bawah hanya saat pesan baru masuk
            msgBox.scrollTop = msgBox.scrollHeight;
        });

        document.getElementById('chat-in').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
