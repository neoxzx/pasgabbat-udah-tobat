<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT SUPRA v27</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --dark: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }
        
        nav { height: 60px; border-bottom: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; background: #000; position: fixed; top: 0; width: 100%; z-index: 100; }
        #messages { position: absolute; top: 60px; bottom: 80px; width: 100%; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; clear: both; }
        .msg-in { background: #1a1a1a; align-self: flex-start; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.2); align-self: flex-end; border: 1px solid var(--gold); }
        .sender { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 4px; display: block; }
        
        .snap-box { background: #222; border-radius: 10px; padding: 15px; text-align: center; border: 1px dashed var(--gold); cursor: pointer; }
        .snap-img { width: 100%; max-width: 250px; display: none; border-radius: 8px; pointer-events: none; }
        .viewing .snap-img { display: block; }
        .viewing .label { display: none; }

        .bottom-area { position: fixed; bottom: 0; width: 100%; padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; background: #000; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        .btn { background: var(--gold); border: none; padding: 10px 15px; border-radius: 25px; font-weight: bold; cursor: pointer; height: 45px; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <nav>PASGABAT SUPRA v27</nav>
    <div id="messages"></div>

    <div class="bottom-area">
        <label for="file-input" class="btn" id="cam-btn">📷</label>
        <input type="file" id="file-input" accept="image/*">
        <input type="text" id="chat-in" placeholder="Ketik pesan..." autocomplete="off">
        <button class="btn" onclick="sendText()">KIRIM</button>
    </div>

    <script>
        // Gunakan try-catch agar jika ada error muncul peringatan
        try {
            const S_URL = 'https://ebhucnypxltzxwzillmp.supabase.co';
            const S_KEY = 'sb_publishable_6AaF_oCwOuZla0OjibEjXA_xiHYVzvL';
            const _supa = supabase.createClient(S_URL, S_KEY);

            let user = prompt("Masukkan Nama Kamu:") || "Anon_" + Math.floor(Math.random()*100);

            // 1. Fungsi Load Data
            async function load() {
                const { data, error } = await _supa.from('message').select('*').order('created_at', { ascending: true });
                if (error) alert("Gagal ambil data: " + error.message);
                if (data) data.forEach(m => render(m));
            }

            // 2. Fungsi Kirim Teks
            async function sendText() {
                const inp = document.getElementById('chat-in');
                if(!inp.value.trim()) return;
                const val = inp.value;
                inp.value = "";
                const { error } = await _supa.from('message').insert([{ sender: user, content: val, is_snap: false }]);
                if (error) alert("Gagal kirim: " + error.message);
            }

            // 3. Fungsi Kirim Foto
            document.getElementById('file-input').onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                document.getElementById('cam-btn').textContent = "⏳";

                const fName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                
                const { error: upErr } = await _supa.storage.from('photos').upload(fName, file);
                if (upErr) {
                    alert("Gagal Upload Foto: " + upErr.message);
                    document.getElementById('cam-btn').textContent = "📷";
                    return;
                }

                const pUrl = `${S_URL}/storage/v1/object/public/photos/${fName}`;
                await _supa.from('message').insert([{ sender: user, content: pUrl, is_snap: true }]);
                
                document.getElementById('cam-btn').textContent = "📷";
                e.target.value = "";
            };

            // 4. Fungsi Gambar ke Layar
            function render(msg) {
                const box = document.getElementById('messages');
                const div = document.createElement('div');
                const isMe = msg.sender === user;
                div.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
                
                let inner = `<span class="sender">${msg.sender}</span>`;
                if(msg.is_snap) {
                    inner += `<div class="snap-box" onmousedown="this.classList.add('viewing')" onmouseup="this.remove()" ontouchstart="this.classList.add('viewing')" ontouchend="this.remove()">
                             <span class="label">📸 SNAP<br><small>Tahan untuk melihat</small></span>
                             <img src="${msg.content}" class="snap-img" onerror="this.src='https://via.placeholder.com/150?text=Gambar+Error'">
                             </div>`;
                } else {
                    const txt = document.createElement('span');
                    txt.textContent = msg.content;
                    inner += txt.outerHTML;
                }
                
                div.innerHTML = inner;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            }

            // 5. Realtime
            _supa.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'message' }, p => {
                render(p.new);
            }).subscribe();

            load();
            document.getElementById('chat-in').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };

        } catch (e) {
            alert("Sistem Error: " + e.message);
        }
    </script>
</body>
</html>
