<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT v50 // SNAP FIX TOTAL</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #000; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding-top: 80px; }
        
        /* Navbar Floating */
        nav { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.9); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--gold); display: flex; gap: 15px; width: 90%; max-width: 350px; justify-content: center; backdrop-filter: blur(10px); }
        nav a { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

        /* Messages */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; background: #1a1a1a; border-left: 3px solid var(--gold); position: relative; font-size: 14px; cursor: pointer; }
        .msg-out { align-self: flex-end; background: rgba(212, 175, 55, 0.15); border: 1px solid var(--gold); border-left: none; border-right: 3px solid var(--gold); }
        .sender { color: var(--gold); font-size: 10px; font-weight: bold; display: block; margin-bottom: 4px; }

        /* Snap Box */
        .snap-btn-msg { background: #222; padding: 15px; border-radius: 12px; text-align: center; border: 1px dashed var(--gold); color: var(--gold); font-weight: bold; font-size: 12px; }
        .snap-img { width: 100%; max-width: 300px; border-radius: 10px; display: none; margin-top: 5px; }

        /* Reply Bar */
        #reply-bar { background: #111; padding: 8px 15px; display: none; justify-content: space-between; border-top: 1px solid var(--gold); align-items: center; }

        /* Input Bar */
        .input-bar { padding: 10px; background: #000; display: flex; gap: 8px; border-top: 1px solid #222; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; outline: none; font-size: 16px; }
        .btn-icon { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .btn-send { background: var(--gold); border: none; padding: 0 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="livechat.html" style="color:var(--gold)">Chat</a>
    <a href="gallery.html">Gallery</a>
</nav>

<div id="messages"></div>

<div id="reply-bar">
    <span id="reply-label" style="color:var(--gold); font-size: 12px;">Membalas...</span>
    <button onclick="cancelReply()" style="background:none; border:none; color:var(--red); font-size: 20px;">✕</button>
</div>

<div class="input-bar">
    <input type="file" id="f-in" style="display:none" accept="image/*">
    <button class="btn-icon" onclick="document.getElementById('f-in').click()" id="cam-btn">📷</button>
    <input type="text" id="t-in" placeholder="Ketik pesan..." autocomplete="off">
    <button class="btn-send" onclick="sendText()">KIRIM</button>
</div>

<script>
    const S_URL = 'https://ebhucnypxltzxwzillmp.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaHVjbnlweGx0enh3emlsbG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzIzNjIsImV4cCI6MjA5MDEwODM2Mn0.UHwMf9Ac-8KJgsvUQ1NH6yvuNaimpK994FPTBoIiimE';
    
    const _supa = supabase.createClient(S_URL, S_KEY);
    let user = localStorage.getItem('p_name') || prompt("Nama Kamu:") || "Guest";
    localStorage.setItem('p_name', user);
    let rId = null;
    let cache = [];

    async function load() {
        const { data } = await _supa.from('message').select('*').order('created_at', { ascending: true });
        if (data) { cache = data; document.getElementById('messages').innerHTML = ""; data.forEach(m => render(m)); }
    }

    async function deleteMsg(id) {
        if (confirm("Hapus pesan ini?")) { await _supa.from('message').delete().eq('id', id); }
    }

    function render(m) {
        if (!m.content || document.getElementById('msg-'+m.id)) return;
        const box = document.getElementById('messages');
        const div = document.createElement('div');
        div.id = 'msg-' + m.id;
        div.className = `msg ${m.sender === user ? 'msg-out' : ''}`;
        
        // Tahan 1 detik untuk hapus
        let timer;
        div.onmousedown = div.ontouchstart = () => { timer = setTimeout(() => deleteMsg(m.id), 1000); };
        div.onmouseup = div.ontouchend = () => clearTimeout(timer);

        // Klik untuk Reply
        div.onclick = () => {
            rId = m.id;
            document.getElementById('reply-bar').style.display = 'flex';
            document.getElementById('reply-label').innerText = "Balas " + m.sender;
            document.getElementById('t-in').focus();
        };

        let html = `<span class="sender">${m.sender}</span>`;
        if (m.reply_to) {
            const orig = cache.find(x => x.id === m.reply_to);
            if (orig) html += `<div class="replied-box"><b>${orig.sender}</b>: ${orig.is_snap ? '📷 Snap' : orig.content.substring(0,20)}...</div>`;
        }

        if (m.is_snap) {
            html += `<div class="snap-box">
                        <div class="snap-btn-msg">📸 SNAP TERKUNCI (Tahan)</div>
                        <img src="${m.content}" class="snap-img">
                     </div>`;
        } else {
            const s = document.createElement('span'); s.textContent = m.content; html += s.outerHTML;
        }
        
        div.innerHTML = html;
        box.appendChild(div);

        // LOGIKA SNAP
        const sBox = div.querySelector('.snap-box');
        if(sBox) {
            const btn = sBox.querySelector('.snap-btn-msg'), img = sBox.querySelector('.snap-img');
            const show = (e) => { e.stopPropagation(); clearTimeout(timer); img.style.display = 'block'; btn.style.display = 'none'; };
            const hide = () => { div.remove(); };
            sBox.onmousedown = sBox.ontouchstart = show;
            sBox.onmouseup = sBox.ontouchend = hide;
        }
        box.scrollTop = box.scrollHeight;
    }

    window.cancelReply = () => { rId = null; document.getElementById('reply-bar').style.display = 'none'; };

    window.sendText = async () => {
        const inp = document.getElementById('t-in');
        if (!inp.value.trim()) return;
        const val = inp.value; inp.value = "";
        const curRid = rId; cancelReply();
        await _supa.from('message').insert([{ sender: user, content: val, is_snap: false, reply_to: curRid }]);
    }

    // --- FUNGSI KIRIM SNAP FOTO (FIXED) ---
    document.getElementById('f-in').onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        const btn = document.getElementById('cam-btn');
        btn.innerText = "⏳";

        const name = `${Date.now()}_snap`;
        // Upload
        const { error: upErr } = await _supa.storage.from('photos').upload(name, file);
        if(upErr) return alert("Storage Error: Pastikan Bucket 'photos' sudah Public!");

        // Ambil Link
        const url = `${S_URL}/storage/v1/object/public/photos/${name}`;
        
        // Simpan ke Tabel dengan is_snap = true
        const curRid = rId; cancelReply();
        await _supa.from('message').insert([{ sender: user, content: url, is_snap: true, reply_to: curRid }]);
        
        btn.innerText = "📷";
        e.target.value = ""; 
    };

    _supa.channel('room').on('postgres_changes', { event: '*', schema: 'public', table: 'message' }, p => {
        if (p.eventType === 'INSERT') { cache.push(p.new); render(p.new); }
        if (p.eventType === 'DELETE') document.getElementById('msg-'+p.old.id)?.remove();
    }).subscribe();

    load();
    document.getElementById('t-in').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };
</script>
</body>
</html>
