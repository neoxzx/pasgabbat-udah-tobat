<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT // Live Chat</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --dark: #000; --bg: #0a0a0a; }
        * { box-sizing: border-box; }
        body { 
            background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Navigasi Responsive */
        nav { 
            background: rgba(0,0,0,0.95); padding: 15px; border-bottom: 1px solid var(--gold);
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* Chat Area */
        .chat-container { 
            flex: 1; display: flex; flex-direction: column; background: var(--bg);
            max-width: 900px; margin: 0 auto; width: 100%; position: relative;
        }
        
        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            padding-bottom: 100px; /* Ruang agar tidak tertutup input HP */
        }

        /* Bubble Chat */
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; cursor: pointer; position: relative; transition: 0.2s; font-size: 0.9rem; }
        .msg:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .msg-in { background: #1a1a1a; align-self: flex-start; border-left: 3px solid var(--gold); border-bottom-left-radius: 2px; }
        .msg-out { background: rgba(212, 175, 55, 0.15); align-self: flex-end; border: 1px solid var(--gold); border-bottom-right-radius: 2px; }
        .sender { font-size: 0.65rem; color: var(--gold); font-weight: bold; margin-bottom: 4px; display: block; }

        /* Reply Style */
        .reply-box { background: rgba(255,255,255,0.1); padding: 6px 10px; border-radius: 8px; border-left: 3px solid var(--gold); font-size: 0.75rem; margin-bottom: 8px; color: #ccc; opacity: 0.8; }

        /* Reply Bar (Pop up diatas input) */
        #reply-bar { 
            background: #111; padding: 10px 20px; display: none; 
            border-top: 2px solid var(--gold); justify-content: space-between; align-items: center;
        }
        #reply-bar span { font-size: 0.75rem; color: var(--gold); }
        #reply-bar button { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; }

        /* Input Area (Bottom Fixed) */
        .input-area { 
            padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222;
        }
        input { 
            flex: 1; background: #111; border: 1px solid #333; color: #fff; 
            padding: 12px 15px; border-radius: 25px; outline: none; font-size: 16px; /* 16px cegah auto-zoom di iPhone */
        }
        .send-btn { 
            background: var(--gold); border: none; width: 45px; height: 45px; 
            border-radius: 50%; font-weight: bold; cursor: pointer; color: #000;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .msg { max-width: 90%; }
            nav { gap: 10px; padding: 12px 5px; }
            nav a { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="livechat.html">Live Chat</a>
        <a href="anggota.html">Anggota</a>
    </nav>

    <div class="chat-container">
        <div id="messages"></div>

        <div id="reply-bar">
            <span id="reply-text">Membalas: ...</span>
            <button onclick="cancelReply()">BATAL</button>
        </div>

        <div class="input-area">
            <input type="text" id="chat-in" placeholder="Klik pesan untuk balas..." autocomplete="off">
            <button class="send-btn" onclick="send()">></button>
        </div>
    </div>

    <script>
        // CONFIG MILIK ATHALLA
        const firebaseConfig = {
            apiKey: "AIzaSyA-_24DwSrWq6f9HWqO7Xs52TCvqq6p_c4",
            authDomain: "pasgabat-chat.firebaseapp.com",
            databaseURL: "https://pasgabat-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pasgabat-chat",
            storageBucket: "pasgabat-chat.firebasestorage.app",
            messagingSenderId: "1027509963546",
            appId: "1:1027509963546:web:d9e9e51275352a595dbaa3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("global_chat_v12");
        
        let user = prompt("IDENTIFIKASI DIRI (Nama):") || "Anonim";
        let replyTarget = null;

        const inputField = document.getElementById('chat-in');
        const msgBox = document.getElementById('messages');

        // Fungsi Memilih Pesan untuk Dibalas
        function setReply(sender, text) {
            replyTarget = { sender, text };
            document.getElementById('reply-bar').style.display = 'flex';
            document.getElementById('reply-text').textContent = `Membalas ${sender}: "${text.substring(0,15)}..."`;
            inputField.focus();
        }

        function cancelReply() {
            replyTarget = null;
            document.getElementById('reply-bar').style.display = 'none';
        }

        // Fungsi Kirim
        function send() {
            const val = inputField.value.trim();
            if(!val) return;

            const data = {
                sender: user,
                text: val,
                timestamp: Date.now()
            };

            if(replyTarget) {
                data.replyTo = replyTarget;
            }

            db.push().set(data);
            inputField.value = "";
            cancelReply();
        }

        // Tampilkan Pesan (Realtime)
        db.limitToLast(30).on("child_added", (snap) => {
            const d = snap.val();
            const div = document.createElement('div');
            const isMe = d.sender === user;

            div.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
            div.onclick = () => setReply(d.sender, d.text);

            let replyHTML = "";
            if(d.replyTo) {
                replyHTML = `<div class="reply-box"><b>${d.replyTo.sender}</b><br>${d.replyTo.text}</div>`;
            }

            div.innerHTML = `
                <span class="sender">${isMe ? 'SAYA' : d.sender.toUpperCase()}</span>
                ${replyHTML}
                <div class="content"></div>
            `;
            
            div.querySelector('.content').textContent = d.text;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        });

        // Support Enter
        inputField.onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
