<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT v40 // ULTIMATE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #d4af37; 
            --dark: #000; 
            --red: #ff4444; 
            --nav-height: 70px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            padding-top: var(--nav-height); 
        }

        /* --- NAVBAR STYLE --- */
        .main-navbar {
            height: var(--nav-height);
            width: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .nav-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 24px; filter: drop-shadow(0 0 5px var(--gold)); }
        .logo-text { font-weight: 800; letter-spacing: 2px; color: #fff; font-size: 1.1rem; }
        .logo-text .version { color: var(--gold); font-size: 0.8rem; background: rgba(212, 175, 55, 0.1); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

        .status-indicator { display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.05); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 8px #00ff00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        #status-text { font-size: 0.75rem; font-weight: 600; color: #aaa; text-transform: uppercase; }

        /* --- MESSAGES AREA --- */
        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; clear: both; cursor: pointer; position: relative; animation: fadeIn 0.2s; transition: transform 0.1s; }
        .msg:active { transform: scale(0.98); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        
        .msg-in { background: #1a1a1a; align-self: flex-start; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.15); align-self: flex-end; border: 1px solid var(--gold); }
        .sender { color: var(--gold); font-size: 0.7em; font-weight: bold; margin-bottom: 5px; display: block; }

        .replied-box { background: rgba(255,255,255,0.07); border-left: 3px solid var(--gold); padding: 5px 8px; font-size: 0.8em; margin-bottom: 8px; border-radius: 4px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* SNAP STYLE */
        .snap-btn-msg { background: #222; padding: 15px 10px; border-radius: 10px; text-align: center; border: 1px dashed var(--gold); }
        .snap-img { width: 100%; border-radius: 10px; margin-top: 5px; display: none; pointer-events: none; }

        /* --- INPUT & REPLY BAR --- */
        #reply-bar { background: #111; padding: 10px 20px; display: none; justify-content: space-between; border-top: 1px solid var(--gold); align-items: center; }
        
        .input-bar { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; outline: none; font-size: 16px; }
        .btn { background: var(--gold); border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #000; }
        
        .loader { animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="main-navbar">
    <div class="nav-content">
        <div class="logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">PASGABAT <span class="version">v40</span></span>
        </div>
        <div class="status-indicator">
            <span class="dot"></span>
            <span id="status-text">Connected</span>
        </div>
    </div>
</nav>

<div id="messages"></div>

<div id="reply-bar">
    <span id="reply-label" style="font-size:0.8em; color:#d4af37">Membalas seseorang...</span>
    <button onclick="cancelReply()" style="background:none; border:none; color:var(--red); cursor:pointer; font-size: 1.2em;">✕</button>
</div>

<div class="input-bar">
    <input type="file" id="f-in" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('f-in').click()" id="cam-btn">📷</button>
    <input type="text" id="t-in" placeholder="Ketik pesan neural..." autocomplete="off">
    <button class="btn" onclick="sendText()">KIRIM</button>
</div>

<script>
    window.onload = function() {
        const URL = 'https://ebhucnypxltzxwzillmp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaHVjbnlweGx0enh3emlsbG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzIzNjIsImV4cCI6MjA5MDEwODM2Mn0.UHwMf9Ac-8KJgsvUQ1NH6yvuNaimpK994FPTBoIiimE';
        const _supa = supabase.createClient(URL, KEY);

        let user = prompt("Identitas Kamu:") || "User";
        let rId = null;
        let cache = [];

        async function loadData() {
            const { data, error } = await _supa.from('message').select('*').order('created_at', { ascending: true });
            if (error) return;
            if (data) { cache = data; document.getElementById('messages').innerHTML = ""; data.forEach(m => render(m)); }
        }

        // FUNGSI HAPUS PESAN
        async function deleteMsg(id) {
            if (confirm("Hapus pesan ini secara permanen?")) {
                await _supa.from('message').delete().eq('id', id);
            }
        }

        function render(m) {
            if(!m || !m.sender || !m.content || m.sender === "undefined") return;

            const box = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${m.sender === user ? 'msg-out' : 'msg-in'}`;
            div.id = `msg-${m.id}`;
            
            // Logika Tahan untuk Hapus
            let timer;
            div.onmousedown = div.ontouchstart = () => {
                timer = setTimeout(() => { deleteMsg(m.id); }, 1000);
            };
            div.onmouseup = div.ontouchend = div.onmouseleave = () => clearTimeout(timer);

            // Klik Biasa untuk Reply
            div.onclick = () => { 
                rId = m.id; 
                document.getElementById('reply-bar').style.display='flex'; 
                document.getElementById('reply-label').innerText = `Balas ${m.sender}`; 
                document.getElementById('t-in').focus();
            };

            let html = `<span class="sender">${m.sender}</span>`;
            
            if (m.reply_to) {
                const orig = cache.find(x => x.id === m.reply_to);
                if(orig) html += `<div class="replied-box"><b>${orig.sender}</b>: ${orig.is_snap ? '📷 Foto Snap' : orig.content.substring(0,25)}</div>`;
            }

            if (m.is_snap) {
                html += `<div class="snap-wrap">
                            <div class="snap-btn-msg">📸 SNAP TERKUNCI<br><small style="font-size:10px;opacity:0.6">Tahan untuk melihat</small></div>
                            <img src="${m.content}" class="snap-img">
                         </div>`;
            } else {
                const s = document.createElement('span'); s.textContent = m.content; html += s.outerHTML;
            }
            
            div.innerHTML = html;
            box.appendChild(div);

            // Logika Snap (Hanya jika pesan bertipe snap)
            const snapWrap = div.querySelector('.snap-wrap');
            if(snapWrap) {
                const btn = snapWrap.querySelector('.snap-btn-msg');
                const img = snapWrap.querySelector('.snap-img');
                snapWrap.onmousedown = snapWrap.ontouchstart = (e) => {
                    e.stopPropagation();
                    clearTimeout(timer); // Batalkan hapus saat buka snap
                    img.style.display = 'block';
                    btn.style.display = 'none';
                };
                snapWrap.onmouseup = snapWrap.ontouchend = () => div.remove();
            }

            box.scrollTop = box.scrollHeight;
        }

        window.cancelReply = () => { rId = null; document.getElementById('reply-bar').style.display='none'; };

        window.sendText = async () => {
            const inp = document.getElementById('t-in');
            if(!inp.value.trim()) return;
            const v = inp.value; inp.value = ""; 
            const curRid = rId; cancelReply();
            await _supa.from('message').insert([{ sender: user, content: v, is_snap: false, reply_to: curRid }]);
        }

        document.getElementById('f-in').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const camBtn = document.getElementById('cam-btn');
            camBtn.textContent = "⏳"; camBtn.classList.add('loader');

            const name = `${Date.now()}_${file.name.replace(/\s/g,'_')}`;
            await _supa.storage.from('photos').upload(name, file);
            const url = `${URL}/storage/v1/object/public/photos/${name}`;
            const curRid = rId; cancelReply();
            await _supa.from('message').insert([{ sender: user, content: url, is_snap: true, reply_to: curRid }]);
            
            camBtn.textContent = "📷"; camBtn.classList.remove('loader');
            e.target.value = "";
        };

        // Realtime: Listen INSERT & DELETE
        _supa.channel('room_neural').on('postgres_changes', { event: '*', schema: 'public', table: 'message' }, p => { 
            if(p.eventType === 'INSERT') {
                cache.push(p.new); render(p.new); 
            } else if(p.eventType === 'DELETE') {
                const el = document.getElementById(`msg-${p.old.id}`);
                if(el) el.remove();
            }
        }).subscribe();
        
        loadData();
        document.getElementById('t-in').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };
    };
</script>
</body>
</html>
