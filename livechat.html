<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat // PASGABAT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #000; }
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.8s; }
        .loader-circle { width: 80px; height: 80px; border: 3px solid transparent; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        nav { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.9); padding: 12px 30px; border-radius: 50px; border: 1px solid var(--gold); display: flex; gap: 25px; }
        nav a { color: #fff; text-decoration: none; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }

        .chat-container { flex: 1; margin: 120px 10% 20px; border: 1px solid var(--gold); display: flex; flex-direction: column; background: #050505; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
        .msg-in { background: #1a1a1a; align-self: flex-start; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.2); align-self: flex-end; border: 1px solid var(--gold); }
        .sender { font-size: 0.65rem; color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; }
        
        .input-area { padding: 20px; display: flex; gap: 10px; background: #111; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; outline: none; }
        button { background: var(--gold); border: none; padding: 0 25px; font-weight: bold; cursor: pointer; border-radius: 10px; color: #000; }
    </style>
</head>
<body>
    <div id="loader-wrapper"><div class="loader-circle"></div></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="livechat.html">Live Chat</a>
        <a href="anggota.html">Anggota</a>
    </nav>
    <div class="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="chat-in" placeholder="Ketik pesan neural..." autocomplete="off" onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()">KIRIM</button>
        </div>
    </div>

    <script>
        // BAGIAN YANG DIPERBAIKI (Config Lengkap & URL Singapore)
        const firebaseConfig = {
            apiKey: "AIzaSyA-_24DwSrWq6f9HWqO7Xs52TCvqq6p_c4",
            authDomain: "pasgabat-chat.firebaseapp.com",
            databaseURL: "https://pasgabat-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pasgabat-chat",
            storageBucket: "pasgabat-chat.firebasestorage.app",
            messagingSenderId: "1027509963546",
            appId: "1:1027509963546:web:d9e9e51275352a595dbaa3"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("supreme_chat_v10");
        
        let user = prompt("IDENTIFIKASI DIRI: Nama anda?") || "Anonymous";

        function send() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim()) return;
            
            // Mengirim data ke Firebase
            db.push().set({ 
                sender: user, 
                text: input.value,
                time: Date.now() 
            });
            input.value = "";
        }

        // Mendengarkan pesan baru secara real-time
        db.limitToLast(15).on("child_added", (snap) => {
            const d = snap.val();
            const box = document.getElementById('messages');
            const div = document.createElement('div');
            
            div.className = `msg ${d.sender === user ? 'msg-out' : 'msg-in'}`;
            
            // Menggunakan textContent untuk pesan agar lebih aman
            const senderHTML = `<span class="sender">${d.sender.toUpperCase()}</span>`;
            div.innerHTML = senderHTML;
            
            const textNode = document.createTextNode(d.text);
            div.appendChild(textNode);
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // Loader animation
        window.onload = () => { 
            setTimeout(() => { 
                document.getElementById('loader-wrapper').style.opacity = '0'; 
                setTimeout(() => document.getElementById('loader-wrapper').style.display = 'none', 800); 
            }, 1000); 
        };
    </script>
</body>
</html>
