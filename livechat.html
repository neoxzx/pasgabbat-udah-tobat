<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT v46 // BYPASS CONNECT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; background: #1a1a1a; border-left: 3px solid #d4af37; }
        .msg-out { align-self: flex-end; background: rgba(212, 175, 55, 0.2); border: 1px solid #d4af37; border-left: none; }
        .sender { color: #d4af37; font-size: 10px; font-weight: bold; display: block; }
        .input-bar { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; outline: none; }
        button { background: #d4af37; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        #status { position: fixed; top: 10px; width: 100%; text-align: center; font-size: 9px; color: #d4af37; }
    </style>
</head>
<body>

<div id="status">SINKRONISASI NEURAL...</div>
<div id="messages"></div>

<div class="input-bar">
    <input type="text" id="t-in" placeholder="Ketik pesan..." autocomplete="off">
    <button onclick="send()">KIRIM</button>
</div>

<script>
    // MASUKKAN DATA DARI GAMBAR image_caaf08.png KAMU
    const S_URL = 'https://ebhucnypxltzxwzillmp.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaHVjbnlweGx0enh3emlsbG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzIzNjIsImV4cCI6MjA5MDEwODM2Mn0.UHwMf9Ac-8KJgsvUQ1NH6yvuNaimpK994FPTBoIiimE';

    const _supa = supabase.createClient(S_URL, S_KEY);
    let user = localStorage.getItem('p_name') || prompt("Siapa nama kamu?") || "Guest";
    localStorage.setItem('p_name', user);

    async function load() {
        try {
            const { data, error } = await _supa.from('message').select('*').order('created_at', { ascending: true });
            if (error) throw error;
            document.getElementById('messages').innerHTML = "";
            data.forEach(m => render(m));
            document.getElementById('status').innerText = "SYSTEM ONLINE | USER: " + user.toUpperCase();
        } catch (e) {
            document.getElementById('status').innerText = "KONEKSI GAGAL: " + e.message;
        }
    }

    function render(m) {
        if (!m.content || document.getElementById('msg-'+m.id)) return;
        const box = document.getElementById('messages');
        const div = document.createElement('div');
        div.id = 'msg-' + m.id;
        div.className = `msg ${m.sender === user ? 'msg-out' : ''}`;
        div.innerHTML = `<span class="sender">${m.sender}</span>${m.content}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    window.send = async () => {
        const inp = document.getElementById('t-in');
        if (!inp.value.trim()) return;
        const txt = inp.value; inp.value = "";
        const { error } = await _supa.from('message').insert([{ sender: user, content: txt }]);
        if (error) alert("Gagal: " + error.message);
    }

    // REALTIME - Kunci utama agar HP langsung update
    _supa.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'message' }, p => {
        render(p.new);
    }).subscribe();

    load();
    document.getElementById('t-in').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
