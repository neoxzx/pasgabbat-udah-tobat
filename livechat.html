<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT v38 // SNAP FIX</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #000; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Nav & Messages */
        nav { height: 60px; border-bottom: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; background: #000; }
        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Bubble Chat */
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; clear: both; cursor: pointer; position: relative; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        .msg-in { background: #1a1a1a; align-self: flex-start; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.15); align-self: flex-end; border: 1px solid var(--gold); }
        .sender { color: var(--gold); font-size: 0.7em; font-weight: bold; margin-bottom: 5px; display: block; }

        /* Reply Preview */
        .replied-box { background: rgba(255,255,255,0.07); border-left: 3px solid var(--gold); padding: 5px 8px; font-size: 0.8em; margin-bottom: 8px; border-radius: 4px; color: #999; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* SNAP STYLE */
        .snap-container { cursor: pointer; position: relative; }
        .snap-btn-msg { background: #222; padding: 15px 10px; border-radius: 10px; text-align: center; border: 1px dashed var(--gold); }
        .snap-label { font-size: 0.9em; font-weight: bold; color: var(--gold); }
        .snap-sublabel { font-size: 0.7em; color: #aaa; }
        .snap-img { width: 100%; border-radius: 10px; margin-top: 5px; display: none; pointer-events: none; }

        /* Bar Reply */
        #reply-bar { background: #1a1a1a; padding: 10px 15px; display: none; justify-content: space-between; border-top: 1px solid var(--gold); align-items: center; }
        
        /* Input Area */
        .input-bar { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; outline: none; font-size: 16px; }
        .btn { background: var(--gold); border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #000; }
        .loader { color: #d4af37; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>PASGABAT SUPRA v38</nav>
<div id="messages"></div>

<div id="reply-bar">
    <span id="reply-label" style="font-size:0.8em; color:#d4af37">Membalas seseorang...</span>
    <button onclick="cancelReply()" style="background:none; border:none; color:var(--red); cursor:pointer; font-size: 1.2em;">✕</button>
</div>

<div class="input-bar">
    <input type="file" id="f-in" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('f-in').click()" id="cam-btn">📷</button>
    <input type="text" id="t-in" placeholder="Pesan neural..." autocomplete="off">
    <button class="btn" onclick="sendText()">KIRIM</button>
</div>

<script>
    window.onload = function() {
        const URL = 'https://ebhucnypxltzxwzillmp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaHVjbnlweGx0enh3emlsbG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzIzNjIsImV4cCI6MjA5MDEwODM2Mn0.UHwMf9Ac-8KJgsvUQ1NH6yvuNaimpK994FPTBoIiimE';
        const _supa = supabase.createClient(URL, KEY);

        let user = prompt("Identitas Kamu:") || "User";
        let rId = null;
        let cache = [];

        async function loadData() {
            const { data, error } = await _supa.from('message').select('*').order('created_at', { ascending: true });
            if (error) return alert("Database Gagal: " + error.message);
            if (data) { cache = data; document.getElementById('messages').innerHTML = ""; data.forEach(m => render(m)); }
        }

        // --- FUNGSI TAMPILKAN SNAP (ANTI-CRASH) ---
        function attachSnapLogic(container, origId) {
            if(!container) return; // Pelindung jika container null

            const btn = container.querySelector('.snap-btn-msg');
            const img = container.querySelector('.snap-img');

            if (btn && img) {
                // Logika Tahan (Hold)
                container.onmousedown = container.ontouchstart = (e) => {
                    e.stopPropagation(); // Mencegah fitur reply kepanggil
                    img.style.display = 'block';
                    btn.style.display = 'none';
                };

                // Logika Lepas (Release) - HAPUS DARI LAYAR
                container.onmouseup = container.ontouchend = () => {
                    container.parentElement.remove(); // Hapus bubble chatnya
                };
            }
        }

        function render(m) {
            // Saringan Ketat (Anti-Undefined)
            if(!m || !m.sender || !m.content || m.sender === "undefined") return;

            const box = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${m.sender === user ? 'msg-out' : 'msg-in'}`;
            div.setAttribute('data-id', m.id);
            
            // Klik untuk membalas
            div.onclick = () => { 
                rId = m.id; 
                document.getElementById('reply-bar').style.display='flex'; 
                document.getElementById('reply-label').innerText = `Balas ${m.sender}`; 
                document.getElementById('t-in').focus();
            };

            let html = `<span class="sender">${m.sender}</span>`;
            
            // Logika Balasan
            if (m.reply_to) {
                const orig = cache.find(x => x.id === m.reply_to);
                if(orig) {
                    html += `<div class="replied-box"><b>${orig.sender}</b>: ${orig.is_snap ? '📷 Foto Snap' : orig.content.substring(0,25)}</div>`;
                }
            }

            // Logika SNAP (Sekali Lihat)
            if (m.is_snap) {
                html += `<div class="snap-container">
                             <div class="snap-btn-msg">
                                 <span class="snap-label">📸 SNAP TERKUNCI</span><br>
                                 <span class="snap-sublabel">Tahan untuk melihat</span>
                             </div>
                             <img src="${m.content}" class="snap-img" onerror="this.src='https://via.placeholder.com/150?text=Gambar+Rusak'">
                         </div>`;
            } else {
                const s = document.createElement('span'); s.textContent = m.content; html += s.outerHTML;
            }
            
            div.innerHTML = html;
            box.appendChild(div);

            // PASANG LOGIKA SNAP SETELAH DIGAMBAR KE LAYAR
            if(m.is_snap) {
                attachSnapLogic(div.querySelector('.snap-container'), m.id);
            }

            box.scrollTop = box.scrollHeight;
        }

        window.cancelReply = () => { rId = null; document.getElementById('reply-bar').style.display='none'; };

        // Kirim Teks
        window.sendText = async () => {
            const inp = document.getElementById('t-in');
            if(!inp.value.trim()) return;
            const v = inp.value; inp.value = ""; 
            const curRid = rId; cancelReply();
            await _supa.from('message').insert([{ sender: user, content: v, is_snap: false, reply_to: curRid }]);
        }

        // Kirim Foto
        document.getElementById('f-in').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const camBtn = document.getElementById('cam-btn');
            camBtn.textContent = "⏳";
            camBtn.classList.add('loader');

            const name = `${Date.now()}_${file.name.replace(/\s/g,'_')}`;
            const { error: upErr } = await _supa.storage.from('photos').upload(name, file);
            
            if(upErr) {
                alert("Upload Gagal: " + upErr.message + " | Pastikan bucket 'photos' sudah Public.");
                camBtn.textContent = "📷"; camBtn.classList.remove('loader');
                return;
            }

            const url = `${URL}/storage/v1/object/public/photos/${name}`;
            const curRid = rId; cancelReply();
            await _supa.from('message').insert([{ sender: user, content: url, is_snap: true, reply_to: curRid }]);
            
            camBtn.textContent = "📷"; camBtn.classList.remove('loader');
            e.target.value = ""; // Reset
        };

        // Realtime Listener
        _supa.channel('room_neural').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'message' }, payload => { 
            cache.push(payload.new); 
            render(payload.new); 
        }).subscribe();
        
        loadData();
        document.getElementById('t-in').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };
    };
</script>
</body>
</html>
