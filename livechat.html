<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Chat // PASGABAT</title>
    
    <!-- Firebase SDK (Versi Kompatibel) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Mencegah scroll body agar chat saja yang scroll */
        }

        /* --- LOADER --- */
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s; }
        .loader-circle { width: 60px; height: 60px; border: 3px solid transparent; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- NAVBAR --- */
        nav { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            padding: 10px 20px; border-radius: 50px; border: 1px solid var(--gold); 
            display: flex; gap: 15px; width: 90%; max-width: 400px; justify-content: center;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.65rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        /* --- CHAT AREA --- */
        .chat-container { 
            flex: 1; 
            margin-top: 80px; /* Jarak untuk navbar */
            display: flex; 
            flex-direction: column; 
            background: linear-gradient(to bottom, #0a0a0a, #000);
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            scroll-behavior: smooth;
        }

        /* Bubble Chat */
        .msg { 
            max-width: 85%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            font-size: 0.9rem; 
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-in { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .msg-out { background: rgba(212, 175, 55, 0.15); align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid var(--gold); }

        .sender-name { 
            font-size: 0.65rem; 
            font-weight: bold; 
            color: var(--gold); 
            margin-bottom: 4px; 
            display: block; 
            text-transform: uppercase;
        }

        .timestamp { font-size: 0.55rem; color: #555; margin-top: 5px; display: block; text-align: right; }

        /* --- INPUT AREA --- */
        .input-area { 
            padding: 15px; 
            background: #111; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #222;
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); /* Support iPhone Notch */
        }

        input { 
            flex: 1; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 12px 15px; 
            border-radius: 25px; 
            outline: none; 
            font-family: inherit;
        }
        input:focus { border-color: var(--gold); }

        button { 
            background: var(--gold); 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.9); }
        button svg { fill: #000; width: 20px; height: 20px; }

        /* Label Status Online */
        .status-bar { background: #000; font-size: 0.6rem; color: #444; text-align: center; padding: 5px; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="loader-wrapper"><div class="loader-circle"></div></div>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="livechat.html">Live Chat</a>
        <a href="anggota.html">Anggota</a>
    </nav>

    <div class="chat-container">
        <div id="messages">
            <!-- Pesan dari Firebase akan muncul di sini -->
        </div>

        <div class="status-bar" id="status-text">Menghubungkan ke Neural Link PASGABAT...</div>

        <div class="input-area">
            <input type="text" id="chat-in" placeholder="Ketik pesan..." autocomplete="off">
            <button onclick="send()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        // 1. KONFIGURASI FIREBASE
        // Gunakan database publik saya untuk testing langsung
        const firebaseConfig = {
            databaseURL: "https://pasgabat-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("pasgabat_live_v1");

        // 2. SISTEM IDENTIFIKASI NAMA
        let username = localStorage.getItem("pasgabat_name");

        if (!username) {
            username = prompt("IDENTIFIKASI PASGABAT: Siapa nama anda?") || "Anonymous";
            localStorage.setItem("pasgabat_name", username);
        }

        document.getElementById('status-text').innerText = "IDENTIFIED AS: " + username.toUpperCase() + " | SECURE CONNECTION";

        // 3. FUNGSI KIRIM PESAN
        function send() {
            const input = document.getElementById('chat-in');
            const message = input.value.trim();

            if (message !== "") {
                db.push().set({
                    sender: username,
                    text: message,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                input.value = "";
            }
        }

        // Support Enter Key
        document.getElementById('chat-in').addEventListener("keypress", function(e) {
            if (e.key === "Enter") send();
        });

        // 4. MENERIMA PESAN REAL-TIME
        // limitToLast(50) artinya mengambil 50 pesan terakhir yang tersimpan
        db.limitToLast(50).on("child_added", (snapshot) => {
            const data = snapshot.val();
            const messageBox = document.getElementById('messages');
            const isMe = data.sender === username;

            const messageElement = document.createElement('div');
            messageElement.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
            
            messageElement.innerHTML = `
                <span class="sender-name">${data.sender}</span>
                <span class="text">${data.text}</span>
                <span class="timestamp">${data.timestamp}</span>
            `;

            messageBox.appendChild(messageElement);
            
            // Auto scroll ke bawah setiap ada pesan baru
            messageBox.scrollTop = messageBox.scrollHeight;
        });

        // 5. LOADER LOGIC
        window.addEventListener("load", function() {
            setTimeout(() => {
                document.getElementById("loader-wrapper").style.opacity = "0";
                setTimeout(() => { document.getElementById("loader-wrapper").style.display = "none"; }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
