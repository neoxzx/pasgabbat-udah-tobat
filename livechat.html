<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT // Snap v17</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { --gold: #d4af37; --dark: #000; }
        body, html { background: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100%; overflow: hidden; }
        #messages { position: absolute; top: 60px; bottom: 85px; left: 0; right: 0; overflow-y: auto; padding: 20px 15px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; margin-bottom: 15px; clear: both; position: relative; }
        .msg-in { background: #1a1a1a; float: left; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.15); float: right; border: 1px solid var(--gold); }
        .snap-box { background: #222; border-radius: 10px; padding: 15px; text-align: center; border: 1px dashed var(--gold); cursor: pointer; }
        .snap-img { width: 100%; max-width: 250px; display: none; border-radius: 8px; }
        .viewing .snap-img { display: block; }
        .viewing .label { display: none; }
        .bottom-area { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        .btn { background: var(--gold); border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #file-input { display: none; }
        .alert-ss { background: red; color: #fff; padding: 5px; text-align: center; font-size: 0.7rem; clear: both; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div style="height:60px; border-bottom:1px solid var(--gold); display:flex; align-items:center; justify-content:center; font-weight:bold;">PASGABAT SNAP</div>
    
    <div id="messages"></div>

    <div class="bottom-area">
        <label for="file-input" class="btn">📷</label>
        <input type="file" id="file-input" accept="image/*">
        <input type="text" id="chat-in" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')sendText()">
        <button class="btn" onclick="sendText()">SEND</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA-_24DwSrWq6f9HWqO7Xs52TCvqq6p_c4",
            authDomain: "pasgabat-chat.firebaseapp.com",
            databaseURL: "https://pasgabat-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pasgabat-chat",
            storageBucket: "pasgabat-chat.appspot.com", // PASTIKAN INI BENAR
            messagingSenderId: "1027509963546",
            appId: "1:1027509963546:web:d9e9e51275352a595dbaa3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("snap_v17");
        const storage = firebase.storage().ref();
        
        let user = prompt("Nama:") || "Anon";

        // Deteksi SS (Desktop)
        window.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                db.push().set({ type: 'alert', sender: user });
            }
        });

        // Kirim Foto
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const name = Date.now() + "_" + file.name;
                const uploadTask = await storage.child('photos/' + name).put(file);
                const url = await uploadTask.ref.getDownloadURL();
                db.push().set({ type: 'snap', sender: user, url: url });
            } catch (err) {
                alert("Gagal kirim foto! Cek apakah Storage sudah aktif & Rules diset true.");
                console.error(err);
            }
        };

        function sendText() {
            const inp = document.getElementById('chat-in');
            if(!inp.value.trim()) return;
            db.push().set({ type: 'text', sender: user, text: inp.value });
            inp.value = "";
        }

        db.limitToLast(20).on("child_added", (snap) => {
            const d = snap.val();
            const msgBox = document.getElementById('messages');
            const div = document.createElement('div');
            
            if(d.type === 'alert') {
                div.className = 'alert-ss';
                div.textContent = `🚨 ${d.sender} mencoba Screenshot!`;
            } else {
                const isMe = d.sender === user;
                div.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
                let content = `<small style="color:var(--gold)">${d.sender}</small><br>`;
                
                if(d.type === 'snap') {
                    content += `
                        <div class="snap-box" 
                             onmousedown="this.classList.add('viewing')" 
                             onmouseup="this.remove()" 
                             ontouchstart="this.classList.add('viewing')" 
                             ontouchend="this.remove()">
                            <span class="label">📸 SNAP TERKUNCI<br><small>Tahan untuk melihat</small></span>
                            <img src="${d.url}" class="snap-img">
                        </div>`;
                } else {
                    content += `<span>${d.text}</span>`;
                }
                div.innerHTML = content;
            }
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    </script>
</body>
</html>
