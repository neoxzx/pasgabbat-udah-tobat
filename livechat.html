<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Chat // PASGABAT</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* FIX UNTUK MOBILE: Menggunakan dvh agar tidak terpotong bar browser */
        body, html { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- LOADER --- */
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid transparent; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- NAVBAR (Floating) --- */
        nav { 
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
            padding: 8px 15px; border-radius: 50px; border: 1px solid var(--gold); 
            display: flex; gap: 12px; width: auto; min-width: 280px; justify-content: center;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.6rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        /* --- CHAT AREA CONTAINER --- */
        .chat-app {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 60px; /* Memberi ruang untuk navbar */
            overflow: hidden;
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            /* Scroll smooth untuk iOS */
            -webkit-overflow-scrolling: touch; 
        }

        /* Bubble Chat */
        .msg { 
            max-width: 85%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            font-size: 0.85rem; 
            line-height: 1.4;
            animation: pop 0.3s ease;
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .msg-in { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .msg-out { background: rgba(212, 175, 55, 0.1); align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid var(--gold); }

        .sender-name { font-size: 0.6rem; font-weight: bold; color: var(--gold); margin-bottom: 3px; display: block; }
        .timestamp { font-size: 0.5rem; color: #444; margin-top: 4px; display: block; text-align: right; }

        /* --- INPUT AREA (POSISI FIX DI BAWAH) --- */
        .input-area { 
            background: #111; 
            padding: 10px 15px;
            display: flex; 
            gap: 10px; 
            align-items: center;
            border-top: 1px solid #222;
            /* Tambahan padding bawah untuk navigasi gesture iPhone/Android baru */
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 10px));
        }

        input { 
            flex: 1; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 12px 18px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px; /* Mencegah auto-zoom di iOS */
        }
        input:focus { border-color: var(--gold); }

        button { 
            background: var(--gold); 
            border: none; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
            cursor: pointer;
        }
        button svg { fill: #000; width: 18px; height: 18px; }

        .id-badge {
            font-size: 0.55rem;
            color: #555;
            text-align: center;
            padding: 4px;
            background: #000;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper"><div class="loader-circle"></div></div>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="livechat.html">Chat</a>
        <a href="anggota.html">Anggota</a>
    </nav>

    <div class="chat-app">
        <div id="messages">
            <!-- Messages load here -->
        </div>

        <div class="id-badge" id="user-badge">SECURE CONNECTION...</div>

        <div class="input-area">
            <input type="text" id="chat-in" placeholder="Tulis pesan..." autocomplete="off">
            <button onclick="send()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = { databaseURL: "https://pasgabat-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("pasgabat_mobile_v2");

        // USERNAME SETUP
        let username = localStorage.getItem("pasgabat_name");
        if (!username) {
            username = prompt("IDENTIFIKASI PASGABAT: Siapa nama anda?") || "Guest_" + Math.floor(Math.random()*100);
            localStorage.setItem("pasgabat_name", username);
        }
        document.getElementById('user-badge').innerText = "IDENTIFIED AS: " + username.toUpperCase();

        // SEND LOGIC
        function send() {
            const input = document.getElementById('chat-in');
            const txt = input.value.trim();
            if (txt !== "") {
                db.push().set({
                    sender: username,
                    text: txt,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                input.value = "";
                input.focus();
            }
        }

        document.getElementById('chat-in').addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });

        // RECEIVE LOGIC
        db.limitToLast(50).on("child_added", (snap) => {
            const data = snap.val();
            const box = document.getElementById('messages');
            const isMe = data.sender === username;

            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
            div.innerHTML = `
                <span class="sender-name">${data.sender}</span>
                <span class="text">${data.text}</span>
                <span class="timestamp">${data.time}</span>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // LOADER & FIX KEYBOARD JUMP
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader-wrapper').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-wrapper').style.display = 'none', 500);
            }, 800);
        };

        // Scroll ke bawah saat keyboard muncul (khusus mobile)
        const chatInput = document.getElementById('chat-in');
        chatInput.addEventListener('focus', () => {
            setTimeout(() => {
                const box = document.getElementById('messages');
                box.scrollTop = box.scrollHeight;
            }, 300);
        });
    </script>
</body>
</html>
