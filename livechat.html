<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT // Snap & Anti-SS</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --dark: #000; --red: #ff4444; }
        * { box-sizing: border-box; }
        body, html { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100%; overflow: hidden; }

        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--gold); display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 1000; }
        nav a { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }

        #messages { position: absolute; top: 60px; bottom: 85px; left: 0; right: 0; overflow-y: auto; padding: 20px 15px; display: block; -webkit-overflow-scrolling: touch; }

        /* Bubble Chat & Snap */
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; margin-bottom: 15px; clear: both; position: relative; font-size: 0.95rem; }
        .msg-in { background: #1a1a1a; float: left; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.15); float: right; border: 1px solid var(--gold); }
        .sender { font-size: 0.65rem; color: var(--gold); font-weight: bold; margin-bottom: 4px; display: block; }
        
        /* Snap Style */
        .snap-img { 
            width: 150px; height: 150px; object-fit: cover; border-radius: 10px; 
            filter: blur(20px); cursor: pointer; transition: 0.3s; 
            border: 2px dashed var(--gold);
        }
        .snap-img.viewing { filter: blur(0); width: 250px; height: auto; z-index: 100; }
        .snap-label { font-size: 0.7rem; color: var(--gold); display: block; margin-top: 5px; text-align: center; }
        
        /* Warning SS */
        .alert-ss { background: var(--red); color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; margin: 10px auto; text-align: center; clear: both; width: fit-content; }

        .bottom-area { position: fixed; bottom: 0; width: 100%; background: #000; z-index: 999; border-top: 1px solid #222; }
        .input-area { padding: 15px; display: flex; gap: 8px; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 14px; }
        .btn-action { background: var(--gold); border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-snap { background: #333; color: var(--gold); border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <nav><a href="#">PASGABAT SECURE CHAT</a></nav>

    <div id="messages"></div>

    <div class="bottom-area">
        <div class="input-area">
            <button class="btn-action btn-snap" onclick="sendSnap()">📷 SNAP</button>
            <input type="text" id="chat-in" placeholder="Ketik pesan..." autocomplete="off">
            <button class="btn-action" onclick="sendText()">KIRIM</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA-_24DwSrWq6f9HWqO7Xs52TCvqq6p_c4",
            authDomain: "pasgabat-chat.firebaseapp.com",
            databaseURL: "https://pasgabat-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pasgabat-chat",
            storageBucket: "pasgabat-chat.firebasestorage.app",
            messagingSenderId: "1027509963546",
            appId: "1:1027509963546:web:d9e9e51275352a595dbaa3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("secure_chat_v15");
        let user = prompt("Nama Samaran:") || "Anon";

        // Deteksi Screenshot (Keyboard Shortcut)
        window.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 'p')) {
                db.push().set({ type: 'alert', sender: user, text: 'Mencoba mengambil Screenshot! 🚨' });
                alert("DILARANG SCREENSHOT!");
            }
        });

        function sendText() {
            const inp = document.getElementById('chat-in');
            if(!inp.value.trim()) return;
            db.push().set({ type: 'text', sender: user, text: inp.value });
            inp.value = "";
        }

        function sendSnap() {
            const url = prompt("Masukkan URL Gambar (Gunakan link foto):");
            if(url) {
                db.push().set({ type: 'snap', sender: user, url: url, viewed: false });
            }
        }

        db.limitToLast(30).on("child_added", (snap) => {
            const d = snap.val();
            const msgBox = document.getElementById('messages');
            
            if(d.type === 'alert') {
                const div = document.createElement('div');
                div.className = 'alert-ss';
                div.textContent = `${d.sender} ${d.text}`;
                msgBox.appendChild(div);
            } else {
                const div = document.createElement('div');
                const isMe = d.sender === user;
                div.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
                
                let content = `<span class="sender">${d.sender}</span>`;
                
                if(d.type === 'snap') {
                    content += `
                        <img src="${d.url}" class="snap-img" onmousedown="viewSnap(this)" onmouseup="hideSnap(this)" ontouchstart="viewSnap(this)" ontouchend="hideSnap(this)">
                        <span class="snap-label">Tahan untuk melihat 👁️</span>
                    `;
                } else {
                    const txt = document.createElement('span');
                    txt.textContent = d.text;
                    content += txt.outerHTML;
                }
                
                div.innerHTML = content;
                msgBox.appendChild(div);
            }
            
            const clear = document.createElement('div'); clear.style.clear = "both";
            msgBox.appendChild(clear);
            msgBox.scrollTop = msgBox.scrollHeight;
        });

        function viewSnap(el) { el.classList.add('viewing'); }
        function hideSnap(el) { 
            el.classList.remove('viewing'); 
            el.style.display = 'none'; // Langsung hilangkan setelah dilepas
            el.nextElementSibling.textContent = "Sudah dilihat";
        }

        document.getElementById('chat-in').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };
    </script>
</body>
</html>
