<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASGABAT v49 // ULTIMATE SNAP</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #000; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #fff; font-family: 'Montserrat', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
            padding-top: 85px; 
        }

        /* NAVBAR FLOATING */
        nav { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            padding: 10px 15px; border-radius: 50px; border: 1px solid var(--gold); 
            display: flex; gap: 12px; width: 90%; max-width: 400px; justify-content: center;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.6rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        /* MESSAGES AREA */
        #messages { flex: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; clear: both; position: relative; font-size: 14px; line-height: 1.4; transition: transform 0.1s; cursor: pointer; }
        .msg-in { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid var(--gold); }
        .msg-out { background: rgba(212, 175, 55, 0.15); align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid var(--gold); }
        .sender { color: var(--gold); font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; }

        /* REPLY PREVIEW */
        .replied-box { background: rgba(255,255,255,0.08); border-left: 2px solid var(--gold); padding: 4px 8px; font-size: 11px; margin-bottom: 6px; border-radius: 4px; color: #999; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* SNAP STYLE ULTIMATE */
        .snap-wrap { position: relative; width: 100%; display: flex; justify-content: center; }
        .snap-btn-msg { background: #222; padding: 15px; border-radius: 12px; text-align: center; border: 1px dashed var(--gold); width: 100%; margin: 5px 0; font-family: 'Cinzel'; color: var(--gold); }
        .snap-img { width: 100%; max-width: 300px; border-radius: 10px; display: none; pointer-events: none; margin-top: 5px; animation: scaleIn 0.2s; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- INPUT AREA MOBILE --- */
        #reply-bar { background: #111; padding: 8px 15px; display: none; justify-content: space-between; border-top: 1px solid var(--gold); align-items: center; font-size: 12px; }
        
        .input-bar { padding: 12px; background: #000; display: flex; gap: 8px; border-top: 1px solid #222; align-items: center; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        input[type="text"] { flex: 1; padding: 12px 16px; border-radius: 25px; border: 1px solid #333; background: #111; color: #fff; outline: none; font-size: 16px; }
        
        .btn-action { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #000; flex-shrink: 0; }
        .btn-send { width: auto; padding: 0 20px; border-radius: 25px; font-weight: bold; }
        
        .loader { animation: spin 1s infinite linear; font-size: 1.5em; color: #fff; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="livechat.html" style="color: var(--gold);">Live Chat</a>
    <a href="anggota.html">Anggota</a>
</nav>

<div id="messages"></div>

<div id="reply-bar">
    <span id="reply-label" style="color:#d4af37">Membalas seseorang...</span>
    <button onclick="cancelReply()" style="background:none; border:none; color:var(--red); font-size: 1.2em; cursor:pointer;">✕</button>
</div>

<div class="input-bar">
    <input type="file" id="f-in" style="display:none" accept="image/*">
    <button class="btn-action" onclick="document.getElementById('f-in').click()" id="cam-btn">📷</button>
    <input type="text" id="t-in" placeholder="Ketik pesan neural..." autocomplete="off">
    <button class="btn-action btn-send" onclick="sendText()">KIRIM</button>
</div>

<script>
    // Konfigurasi Supabase
    const URL = 'https://ebhucnypxltzxwzillmp.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaHVjbnlweGx0enh3emlsbG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzIzNjIsImV4cCI6MjA5MDEwODM2Mn0.UHwMf9Ac-8KJgsvUQ1NH6yvuNaimpK994FPTBoIiimE';
    const _supa = supabase.createClient(URL, KEY);

    let user = prompt("Identitas Kamu:") || "User_" + Math.floor(Math.random()*100);
    let rId = null;
    let cache = [];

    async function loadData() {
        const { data } = await _supa.from('message').select('*').order('created_at', { ascending: true });
        if (data) { cache = data; document.getElementById('messages').innerHTML = ""; data.forEach(m => render(m)); }
    }

    async function deleteMsg(id) {
        if (confirm("Hapus pesan ini permanen?")) {
            await _supa.from('message').delete().eq('id', id);
        }
    }

    function render(m) {
        if(!m || !m.sender || !m.content || document.getElementById(`msg-${m.id}`)) return;
        const box = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${m.sender === user ? 'msg-out' : 'msg-in'}`;
        div.id = `msg-${m.id}`;
        
        // Logika Tahan untuk Hapus
        let timer;
        const startHold = () => { timer = setTimeout(() => { deleteMsg(m.id); }, 1000); };
        const endHold = () => { clearTimeout(timer); };
        div.addEventListener('touchstart', startHold);
        div.addEventListener('touchend', endHold);
        div.onmousedown = startHold; div.onmouseup = endHold;

        // Klik untuk Reply
        div.onclick = (e) => { 
            rId = m.id; 
            document.getElementById('reply-bar').style.display='flex'; 
            document.getElementById('reply-label').innerText = `Balas ${m.sender}`; 
            document.getElementById('t-in').focus();
        };

        let html = `<span class="sender">${m.sender.toUpperCase()}</span>`;
        if (m.reply_to) {
            const orig = cache.find(x => x.id === m.reply_to);
            if(orig) html += `<div class="replied-box"><b>${orig.sender}</b>: ${orig.is_snap ? '📷 Foto Snap' : orig.content.substring(0,25)}</div>`;
        }

        if (m.is_snap) {
            html += `<div class="snap-wrap">
                        <div class="snap-btn-msg">
                            <span class="logo-icon" style="font-size:20px">📸</span><br>
                            SNAP TERKUNCI<br>
                            <small style="font-size:9px;opacity:0.5;font-family:Montserrat">Tahan untuk melihat</small>
                        </div>
                        <img src="${m.content}" class="snap-img" onerror="this.src='https://via.placeholder.com/150?text=Gambar+Rusak'">
                     </div>`;
        } else {
            const s = document.createElement('span'); s.textContent = m.content; html += s.outerHTML;
        }
        
        div.innerHTML = html;
        box.appendChild(div);

        // LOGIKA TAHAN FOTO (SNAP) - Sekali Lihat
        const snapWrap = div.querySelector('.snap-wrap');
        if(snapWrap) {
            const btn = snapWrap.querySelector('.snap-btn-msg'), img = snapWrap.querySelector('.snap-img');
            
            // FUNGSI BUKA SNAP
            const openSnap = (e) => {
                e.stopPropagation(); // Biar fitur reply nggak kepanggil
                clearTimeout(timer); // Batalkan logic hapus
                img.style.display = 'block';
                btn.style.display = 'none';
            };
            
            // FUNGSI TUTUP SNAP (HAPUS)
            const closeSnap = () => {
                // Hapus dari database (Optional: kalau mau bener-bener hilang)
                // _supa.from('message').delete().eq('id', m.id); 
                
                // Hapus dari layar saja
                div.remove();
            };

            // Event Listeners (Tahan = Buka, Lepas = Tutup)
            snapWrap.addEventListener('touchstart', openSnap);
            snapWrap.addEventListener('touchend', closeSnap);
            snapWrap.onmousedown = openSnap; snapWrap.onmouseup = closeSnap;
        }

        box.scrollTop = box.scrollHeight;
    }

    window.cancelReply = () => { rId = null; document.getElementById('reply-bar').style.display='none'; };

    window.sendText = async () => {
        const inp = document.getElementById('t-in');
        if(!inp.value.trim()) return;
        const v = inp.value; inp.value = ""; 
        const curRid = rId; cancelReply();
        await _supa.from('message').insert([{ sender: user, content: v, is_snap: false, reply_to: curRid }]);
    }

    // KIRIM SNAP FOTO
    document.getElementById('f-in').onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        const camBtn = document.getElementById('cam-btn');
        camBtn.innerHTML = `<span class="loader">⏳</span>`;

        // Upload ke bucket 'photos'
        const name = `${Date.now()}_img`;
        await _supa.storage.from('photos').upload(name, file);
        
        // Buat link publik
        const url = `${URL}/storage/v1/object/public/photos/${name}`;
        
        // Simpan sebagai pesan snap
        await _supa.from('message').insert([{ sender: user, content: url, is_snap: true, reply_to: rId }]);
        
        camBtn.innerText = "📷"; cancelReply();
        e.target.value = ""; // Reset
    };

    // Realtime Listener
    _supa.channel('neural_network').on('postgres_changes', { event: '*', schema: 'public', table: 'message' }, p => { 
        if(p.eventType === 'INSERT') { cache.push(p.new); render(p.new); }
        else if(p.eventType === 'DELETE') { document.getElementById(`msg-${p.old.id}`)?.remove(); }
    }).subscribe();
    
    loadData();
    document.getElementById('t-in').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };
</script>
</body>
</html>
